openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for FanFic AI
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stories
    description: Story CRUD and generation
  - name: illustrations
    description: Illustration generation per story
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: List all stories (public feed)
      description: Returns published and draft stories, optionally filtered by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published]
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: authorName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of stories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"
    post:
      operationId: createStory
      tags: [stories]
      summary: Create a new story (saves without generating)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoryBody"
      responses:
        "201":
          description: Story created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/generate:
    post:
      operationId: generateStory
      tags: [stories]
      summary: Generate a complete story with AI
      description: Uses AI to generate a story based on provided parameters, saves it, and returns the result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryBody"
      responses:
        "201":
          description: Generated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/feed:
    get:
      operationId: getPublicFeed
      tags: [stories]
      summary: Get public story feed (published only, sorted by newest)
      parameters:
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Published stories feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"

  /stories/stats:
    get:
      operationId: getStoryStats
      tags: [stories]
      summary: Get aggregate statistics across all stories
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryStats"

  /stories/{id}:
    get:
      operationId: getStory
      tags: [stories]
      summary: Get a single story by ID with its illustrations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Story with illustrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryWithIllustrations"
        "404":
          description: Not found
    patch:
      operationId: updateStory
      tags: [stories]
      summary: Update a story (title, status, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoryBody"
      responses:
        "200":
          description: Updated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found
    delete:
      operationId: deleteStory
      tags: [stories]
      summary: Delete a story and its illustrations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stories/{id}/publish:
    post:
      operationId: publishStory
      tags: [stories]
      summary: Publish a story to the public feed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found

  /stories/{id}/illustrations:
    get:
      operationId: getIllustrations
      tags: [illustrations]
      summary: Get all illustrations for a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of illustrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Illustration"
    post:
      operationId: generateIllustration
      tags: [illustrations]
      summary: Generate an AI illustration for a story section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateIllustrationBody"
      responses:
        "201":
          description: Generated illustration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Illustration"
        "404":
          description: Story not found

  /stories/{id}/illustrations/{illustrationId}:
    delete:
      operationId: deleteIllustration
      tags: [illustrations]
      summary: Delete an illustration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: illustrationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stories/{id}/illustrations/{illustrationId}/regenerate:
    post:
      operationId: regenerateIllustration
      tags: [illustrations]
      summary: Regenerate an existing illustration, optionally with an edited prompt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: illustrationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                promptOverride:
                  type: string
                  description: If provided, replaces the stored prompt for this regeneration and persists.
              additionalProperties: false
      responses:
        "200":
          description: Regenerated illustration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Illustration"
        "404":
          description: Not found

  /stories/{id}/like:
    get:
      operationId: getStoryLike
      tags: [likes]
      summary: Get like count and whether the current user has liked the story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: authorName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Like info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryLikeInfo"
    post:
      operationId: likeStory
      tags: [likes]
      summary: Like a story (idempotent — repeated requests do nothing)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LikeBody"
      responses:
        "200":
          description: Updated like info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryLikeInfo"
    delete:
      operationId: unlikeStory
      tags: [likes]
      summary: Remove the current user's like
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: authorName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated like info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryLikeInfo"

  /stories/{id}/continue:
    post:
      operationId: continueStory
      tags: [stories]
      summary: Append a new chapter to an existing story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinueStoryBody"
      responses:
        "200":
          description: Story with appended chapter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found

  /stories/{id}/audio:
    get:
      operationId: getStoryAudio
      tags: [stories]
      summary: Generate (or stream) TTS audio for a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: voice
          in: query
          required: false
          schema:
            type: string
            enum: [alloy, echo, fable, onyx, nova, shimmer]
            default: nova
      responses:
        "200":
          description: MP3 audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /stories/{id}/export.pdf:
    get:
      operationId: exportStoryPdf
      tags: [stories]
      summary: Export the story as a PDF document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /stories/{id}/regenerate:
    post:
      operationId: regenerateStoryText
      tags: [stories]
      summary: Regenerate full story text using the same genre, style, and seed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Story with updated text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found

  /stories/{id}/sections/{sectionIndex}/regenerate:
    post:
      operationId: regenerateStorySection
      tags: [stories]
      summary: Regenerate text for a specific section and its illustration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sectionIndex
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateSectionBody"
      responses:
        "200":
          description: Regenerated section text and new illustration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateSectionResponse"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Story:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        seedPrompt:
          type: ["string", "null"]
        fullText:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        characters:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, published]
        authorName:
          type: string
        coverImageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - genre
        - artStyle
        - lengthSetting
        - status
        - authorName
        - createdAt
        - updatedAt

    StoryWithIllustrations:
      allOf:
        - $ref: "#/components/schemas/Story"
        - type: object
          properties:
            illustrations:
              type: array
              items:
                $ref: "#/components/schemas/Illustration"
          required:
            - illustrations

    Illustration:
      type: object
      properties:
        id:
          type: integer
        storyId:
          type: integer
        sectionIndex:
          type: integer
        prompt:
          type: string
        imageUrl:
          type: string
        caption:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - storyId
        - sectionIndex
        - prompt
        - imageUrl
        - createdAt

    StoryStats:
      type: object
      properties:
        totalStories:
          type: integer
        publishedStories:
          type: integer
        draftStories:
          type: integer
        totalIllustrations:
          type: integer
        genreBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/GenreCount"
      required:
        - totalStories
        - publishedStories
        - draftStories
        - totalIllustrations
        - genreBreakdown

    GenreCount:
      type: object
      properties:
        genre:
          type: string
        count:
          type: integer
      required:
        - genre
        - count

    CreateStoryBody:
      type: object
      properties:
        title:
          type: string
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        seedPrompt:
          type: string
        fullText:
          type: string
        authorName:
          type: string
      required:
        - title
        - genre
        - artStyle
        - lengthSetting
        - authorName

    ContinueStoryBody:
      type: object
      required: [authorName]
      properties:
        authorName:
          type: string
          minLength: 1
          description: Pen name of the requester. Must match the story author.
        seedPrompt:
          type: string
          description: Optional hint for what should happen in the next chapter.
        generateIllustration:
          type: boolean
          default: true

    StoryLikeInfo:
      type: object
      properties:
        storyId:
          type: integer
        likeCount:
          type: integer
        hasLiked:
          type: boolean
      required: [storyId, likeCount, hasLiked]

    LikeBody:
      type: object
      properties:
        authorName:
          type: string
      required: [authorName]

    GenerateStoryBody:
      type: object
      properties:
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        seedPrompt:
          type: string
        authorName:
          type: string
        generateIllustrations:
          type: boolean
          default: true
        model:
          type: string
          enum: [gpt-5.1, gpt-5-mini]
          default: gpt-5.1
          description: Which AI model to use. gpt-5.1 = higher quality, slower. gpt-5-mini = faster, cheaper.
      required:
        - genre
        - artStyle
        - lengthSetting
        - authorName

    UpdateStoryBody:
      type: object
      properties:
        title:
          type: string
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        fullText:
          type: string
        status:
          type: string
          enum: [draft, published]
        authorName:
          type: string
        coverImageUrl:
          type: string

    GenerateIllustrationBody:
      type: object
      properties:
        sectionIndex:
          type: integer
        sectionText:
          type: string
        caption:
          type: string
      required:
        - sectionIndex
        - sectionText

    RegenerateSectionBody:
      type: object
      properties:
        currentSectionText:
          type: string
          description: The current paragraph text to be rewritten
      required:
        - currentSectionText

    RegenerateSectionResponse:
      type: object
      properties:
        sectionIndex:
          type: integer
        rewrittenText:
          type: string
        illustration:
          $ref: "#/components/schemas/Illustration"
      required:
        - sectionIndex
        - rewrittenText
