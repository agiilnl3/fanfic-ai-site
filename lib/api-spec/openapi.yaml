      responses:
        "200": { description: Progress, content: { application/json: { schema: { $ref: "#/components/schemas/ReadingProgressInfo" } } } }
    post:
      operationId: setReadingProgress
      tags: [stories]
      summary: Save a reader's progress on a story
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReadingProgressBody" }
      responses:
        "200": { description: Updated progress, content: { application/json: { schema: { $ref: "#/components/schemas/ReadingProgressInfo" } } } }

  /stories/{id}/view:
    post:
      operationId: recordStoryView
      tags: [stories]
      summary: Record a story view (analytics)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoryViewBody" }
      responses:
        "204": { description: Recorded }

  /stories/{id}/analytics:
    get:
      operationId: getStoryAnalytics
      tags: [stories]
      summary: Author analytics for a story (last 30 days)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: authorName
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StoryAnalytics" }

  /series:
    get:
      operationId: listSeries
      tags: [stories]
      summary: List series, optionally filtered by author
      parameters:
        - name: authorName
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Series
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Series" }
    post:
      operationId: createSeries
      tags: [stories]
      summary: Create a series
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSeriesBody" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Series" } } } }

  /series/{id}:
    get:
      operationId: getSeries
      tags: [stories]
      summary: Get a series with its stories
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Series, content: { application/json: { schema: { $ref: "#/components/schemas/SeriesWithStories" } } } }
    patch:
      operationId: updateSeries
      tags: [stories]
      summary: Update title/summary
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSeriesBody" }
      responses:
        "200": { description: Series, content: { application/json: { schema: { $ref: "#/components/schemas/Series" } } } }
    delete:
      operationId: deleteSeries
      tags: [stories]
      summary: Delete a series
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: requesterAuthorName
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /series/{id}/stories:
    post:
      operationId: addStoryToSeries
      tags: [stories]
      summary: Add a story to a series (author only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddStoryToSeriesBody" }
      responses:
        "200": { description: Series, content: { application/json: { schema: { $ref: "#/components/schemas/SeriesWithStories" } } } }

  /series/{id}/stories/{storyId}:
    delete:
      operationId: removeStoryFromSeries
      tags: [stories]
      summary: Remove a story from a series
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: storyId
          in: path
          required: true
          schema: { type: integer }
        - name: requesterAuthorName
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: Removed }

  /authors/{name}/notification-prefs:
    get:
      operationId: getNotificationPrefs
      tags: [notifications]
      summary: Get an author's notification preferences
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Prefs, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationPrefs" } } } }
    put:
      operationId: updateNotificationPrefs
      tags: [notifications]
      summary: Update an author's notification preferences
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateNotificationPrefsBody" }
      responses:
        "200": { description: Prefs, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationPrefs" } } } }

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List characters owned by an author (optionally scoped to a series)
      parameters:
        - name: ownerHandle
          in: query
          required: true
          schema: { type: string }
        - name: seriesId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Characters
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Character" }
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Create a reusable character profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCharacterBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }

  /characters/{id}:
    patch:
      operationId: updateCharacter
      tags: [characters]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCharacterBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
    delete:
      operationId: deleteCharacter
      tags: [characters]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: ownerHandle
          in: query
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /characters/{id}/reference:
    post:
      operationId: uploadCharacterReference
      tags: [characters]
      summary: Upload a reference image for a character (base64 PNG/JPEG)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadCharacterReferenceBody" }
      responses:
        "200":
          description: Updated character with reference URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }

  /stories/{id}/characters:
    get:
      operationId: listStoryCharacters
      tags: [characters]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Characters linked to this story
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Character" }
    put:
      operationId: setStoryCharacters
      tags: [characters]
      summary: Replace the set of characters linked to this story
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetStoryCharactersBody" }
      responses:
        "200":
          description: Updated link set
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Character" }

  /series/{id}/characters:
    get:
      operationId: listSeriesCharacters
      tags: [characters]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Characters scoped to this series
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Character" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Story:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        seedPrompt:
          type: ["string", "null"]
        fullText:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        characters:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, published, cancelled]
          description: |
            `cancelled` is set by /stories/generate/stream when the client
            disconnects mid-generation; clients reading these rows should
            treat them as incomplete drafts.
        authorName:
          type: string
        coAuthors:
          type: array
          items:
            type: string
          default: []
        coverImageUrl:
          type: ["string", "null"]
        posterCoverUrl:
          type: ["string", "null"]
          description: Dedicated 16:9 poster cover with title typography baked in. Generated asynchronously after publish; null while pending.
        trailerUrl:
          type: ["string", "null"]
          description: URL of the rendered video trailer mp4 (if any).
        trailerStatus:
          type: ["string", "null"]
          enum: [idle, queued, rendering, ready, failed, null]
          description: Status of the most recent trailer render job.
        createdAt:
          type: string
        updatedAt:
          type: string
        likeCount:
          type: integer
        commentCount:
          type: integer
        tags:
          type: array
          description: Tags attached to this story. Populated by /stories/feed when viewerAuthorName is supplied.
          items:
            $ref: "#/components/schemas/Tag"
        readingProgress:
          type: ["integer", "null"]
          description: Viewer-specific reading progress percentage (0-100). Only set by /stories/feed when viewerAuthorName matches the requester.
        isPrivate:
          type: boolean
          default: false
          description: Conjurer-only privacy flag. Private stories are hidden from feeds and listings.
        parentStoryId:
          type: ["integer", "null"]
          description: ID of the original story this one was remixed from, or null for original stories.
      required:
        - id
        - title
        - genre
        - artStyle
        - lengthSetting
        - status
        - coAuthors
        - authorName
        - createdAt
        - updatedAt
        - likeCount
        - commentCount

    StoryComment:
      type: object
      properties:
        id:
          type: integer
        storyId:
          type: integer
        authorName:
          type: string
        body:
          type: string
        createdAt:
          type: string
        parentId:
          type: ["integer", "null"]
          description: ID of the parent comment when this is a one-level reply, otherwise null.
        paragraphIndex:
          type: ["integer", "null"]
          description: Zero-based index of the paragraph this comment is anchored to. Null for whole-story comments.
      required:
        - id
        - storyId
        - authorName
        - body
        - createdAt
        - parentId
        - paragraphIndex

    AddCommentBody:
      type: object
      properties:
        authorName:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
          maxLength: 2000
        parentId:
          type: ["integer", "null"]
        paragraphIndex:
          type: ["integer", "null"]
          minimum: 0
          description: Zero-based paragraph index this comment anchors to. Omit or null for whole-story comments.
      required: [authorName, body]

    ParagraphCommentCount:
      type: object
      properties:
        paragraphIndex:
          type: integer
        count:
          type: integer
      required: [paragraphIndex, count]

    StoryTrailer:
      type: object
      properties:
        storyId:
          type: integer
        status:
          type: string
          enum: [idle, queued, rendering, ready, failed]
        url:
          type: ["string", "null"]
      required: [storyId, status, url]

    FacetBucket:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
          description: Optional human-readable label (used for tag facets where `value` is the slug).
        count:
          type: integer
      required: [value, count]

    FeedFacets:
      type: object
      properties:
        genres:
          type: array
          items:
            $ref: "#/components/schemas/FacetBucket"
        artStyles:
          type: array
          items:
            $ref: "#/components/schemas/FacetBucket"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/FacetBucket"
      required: [genres, artStyles, tags]

    StoryWithIllustrations:
      allOf:
        - $ref: "#/components/schemas/Story"
        - type: object
          properties:
            illustrations:
              type: array
              items:
                $ref: "#/components/schemas/Illustration"
          required:
            - illustrations

    Illustration:
      type: object
      properties:
        id:
          type: integer
        storyId:
          type: integer
        sectionIndex:
          type: integer
        prompt:
          type: string
        imageUrl:
          type: string
        caption:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - storyId
        - sectionIndex
        - prompt
        - imageUrl
        - createdAt

    StoryStats:
      type: object
      properties:
        totalStories:
          type: integer
        publishedStories:
          type: integer
        draftStories:
          type: integer
        totalIllustrations:
          type: integer
        genreBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/GenreCount"
      required:
        - totalStories
        - publishedStories
        - draftStories
        - totalIllustrations
        - genreBreakdown

    GenreCount:
      type: object
      properties:
        genre:
          type: string
        count:
          type: integer
      required:
        - genre
        - count

    CreateStoryBody:
      type: object
      properties:
        title:
          type: string
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        seedPrompt:
          type: string
        fullText:
          type: string
        authorName:
          type: string
        isPrivate:
          type: boolean
          default: false
          description: Conjurer-only flag; ignored unless the requester is on the Conjurer plan.
      required:
        - title
        - genre
        - artStyle
        - lengthSetting
        - authorName

    ContinueStoryBody:
      type: object
      required: [authorName]
      properties:
        authorName:
          type: string
          minLength: 1
          description: Pen name of the requester. Must match the story author.
        seedPrompt:
          type: string
          description: Optional hint for what should happen in the next chapter.
        generateIllustration:
          type: boolean
          default: true

    StoryLikeInfo:
      type: object
      properties:
        storyId:
          type: integer
        likeCount:
          type: integer
        hasLiked:
          type: boolean
      required: [storyId, likeCount, hasLiked]

    LikeBody:
      type: object
      properties:
        authorName:
          type: string
      required: [authorName]

    GenerateStoryBody:
      type: object
      properties:
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        seedPrompt:
          type: string
        authorName:
          type: string
        generateIllustrations:
          type: boolean
          default: true
        model:
          type: string
          enum: [gpt-5.1, gpt-5-mini]
          default: gpt-5.1
          description: Which AI model to use. gpt-5.1 = higher quality, slower. gpt-5-mini = faster, cheaper.
        isPrivate:
          type: boolean
          default: false
          description: Conjurer-only. Private stories are hidden from public feeds and require the author to view.
      required:
        - genre
        - artStyle
        - lengthSetting
        - authorName

    UpdateStoryBody:
      type: object
      properties:
        title:
          type: string
        genre:
          type: string
        artStyle:
          type: string
        lengthSetting:
          type: string
          enum: [short, medium, long]
        fullText:
          type: string
        status:
          type: string
          enum: [draft, published]
        coverImageUrl:
          type: string
        isPrivate:
          type: boolean
          description: Conjurer-only flag; ignored unless the requester is on the Conjurer plan.

    GenerateIllustrationBody:
      type: object
      properties:
        sectionIndex:
          type: integer
        sectionText:
          type: string
        caption:
          type: string
      required:
        - sectionIndex
        - sectionText

    RegenerateSectionBody:
      type: object
      properties:
        currentSectionText:
          type: string
          description: The current paragraph text to be rewritten
      required:
        - currentSectionText

    RegenerateSectionResponse:
      type: object
      properties:
        sectionIndex:
          type: integer
        rewrittenText:
          type: string
        illustration:
          $ref: "#/components/schemas/Illustration"
      required:
        - sectionIndex
        - rewrittenText

    CoAuthorList:
      type: object
      properties:
        storyId:
          type: integer
        primaryAuthor:
          type: string
        coAuthors:
          type: array
          items:
            type: string
      required: [storyId, primaryAuthor, coAuthors]

    CoAuthorMutationBody:
      type: object
      properties:
        requesterAuthorName:
          type: string
          minLength: 1
          description: Pen name of the primary author making the change.
        coAuthorName:
          type: string
          minLength: 1
          description: Pen name of the co-author to add.
      required: [requesterAuthorName, coAuthorName]

    CoAuthorRemoveBody:
      type: object
      properties:
        requesterAuthorName:
          type: string
          minLength: 1
        coAuthorName:
          type: string
          minLength: 1
      required: [requesterAuthorName, coAuthorName]

    Collaborator:
      type: object
      properties:
        userId:
          type: integer
        handle:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [writer, editor]
        status:
          type: string
          enum: [pending, accepted, declined, revoked]
        invitedAt:
          type: string
        respondedAt:
          type: ["string", "null"]
      required: [userId, handle, displayName, role, status, invitedAt]

    CollaboratorList:
      type: object
      properties:
        storyId:
          type: integer
        primaryAuthor:
          type: string
        primaryUserId:
          type: ["integer", "null"]
        collaborators:
          type: array
          items:
            $ref: "#/components/schemas/Collaborator"
      required: [storyId, primaryAuthor, collaborators]

    InviteCollaboratorBody:
      type: object
      properties:
        handle:
          type: string
          minLength: 1
          description: Handle of the registered user to invite.
        role:
          type: string
          enum: [writer, editor]
          default: writer
      required: [handle]

    RespondInviteBody:
      type: object
      properties:
        action:
          type: string
          enum: [accept, decline]
      required: [action]

    ChapterAuthorRecord:
      type: object
      properties:
        chapterIndex:
          type: integer
        userId:
          type: integer
        handle:
          type: string
      required: [chapterIndex, userId, handle]

    Chapter:
      type: object
      properties:
        id:
          type: integer
        storyId:
          type: integer
        parentChapterId:
          type: integer
          nullable: true
        title:
          type: string
        branchLabel:
          type: string
        text:
          type: string
        position:
          type: integer
        isCanonical:
          type: boolean
        authorHandle:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, storyId, parentChapterId, title, branchLabel, text, position, isCanonical, createdAt]

    ChapterTree:
      type: object
      properties:
        storyId:
          type: integer
        chapters:
          type: array
          items:
            $ref: "#/components/schemas/Chapter"
        canonicalPath:
          type: array
          items:
            type: integer
          description: Ordered list of chapter ids forming the canonical chain (root → leaf).
      required: [storyId, chapters, canonicalPath]

    UpdateChapterBody:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 50000
        title:
          type: string
          maxLength: 200

    BranchChapterBody:
      type: object
      required: [authorName]
      properties:
        authorName:
          type: string
          minLength: 1
        seedPrompt:
          type: string
          description: Optional "what if?" hint guiding the alternate continuations.
        count:
          type: integer
          minimum: 2
          maximum: 3
          default: 2
          description: How many alternative branches to generate.

    BranchChapterResponse:
      type: object
      properties:
        parentChapterId:
          type: integer
          nullable: true
        branches:
          type: array
          items:
            $ref: "#/components/schemas/Chapter"
      required: [parentChapterId, branches]

    ChapterAuthorList:
      type: object
      properties:
        storyId:
          type: integer
        primaryAuthor:
          type: string
        chapters:
          type: array
          items:
            $ref: "#/components/schemas/ChapterAuthorRecord"
      required: [storyId, primaryAuthor, chapters]

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
          minLength: 1
      required: [password]

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
      required: [token]

    AdminStoryRow:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        authorName:
          type: string
        status:
          type: string
          enum: [draft, published]
        genre:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        likeCount:
          type: integer
        illustrationCount:
          type: integer
      required: [id, title, authorName, status, genre, createdAt, updatedAt, likeCount, illustrationCount]

    AdminUpdateStoryBody:
      type: object
      properties:
        status:
          type: string
          enum: [draft, published]
        title:
          type: string
      additionalProperties: false

    AdminStats:
      type: object
      properties:
        totalStories:
          type: integer
        publishedStories:
          type: integer
        draftStories:
          type: integer
        totalIllustrations:
          type: integer
        totalLikes:
          type: integer
        totalAuthors:
          type: integer
      required: [totalStories, publishedStories, draftStories, totalIllustrations, totalLikes, totalAuthors]

    AuthorProfile:
      type: object
      properties:
        authorName:
          type: string
        displayName:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        joinedAt:
          type: ["string", "null"]
        storyCount:
          type: integer
        publishedCount:
          type: integer
        followerCount:
          type: integer
        followingCount:
          type: integer
        totalLikes:
          type: integer
        firstSeenAt:
          type: ["string", "null"]
        tier:
          type: string
          enum: [free, conjurer]
        stories:
          type: array
          items:
            $ref: "#/components/schemas/Story"
      required: [authorName, storyCount, publishedCount, followerCount, followingCount, totalLikes, stories, tier]

    FollowInfo:
      type: object
      properties:
        authorName:
          type: string
        followerCount:
          type: integer
        isFollowing:
          type: boolean
      required: [authorName, followerCount, isFollowing]

    FollowBody:
      type: object
      properties:
        followerName:
          type: string
          minLength: 1
      required: [followerName]

    Notification:
      type: object
      properties:
        id:
          type: integer
        recipientName:
          type: string
        type:
          type: string
