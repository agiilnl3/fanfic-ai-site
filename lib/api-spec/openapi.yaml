openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for FanFic AI
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stories
    description: Story CRUD and generation
  - name: illustrations
    description: Illustration generation per story
  - name: collab
    description: Co-author management for collaborative editing
  - name: admin
    description: Site administration (password-protected)
  - name: likes
    description: Story likes
  - name: comments
    description: Story reader comments
  - name: authors
    description: Author profiles, follows, subscription feed
  - name: notifications
    description: In-app notifications
  - name: reposts
    description: Author reposts of stories
  - name: usage
    description: Daily usage and quotas (free-tier limits)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: List all stories (public feed)
      description: Returns published and draft stories, optionally filtered by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published, cancelled]
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: authorName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of stories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"
    post:
      operationId: createStory
      tags: [stories]
      summary: Create a new story (saves without generating)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoryBody"
      responses:
        "201":
          description: Story created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/generate:
    post:
      operationId: generateStory
      tags: [stories]
      summary: Generate a complete story with AI
      description: Uses AI to generate a story based on provided parameters, saves it, and returns the result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryBody"
      responses:
        "201":
          description: Generated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/generate/stream:
    post:
      operationId: generateStoryStream
      tags: [stories]
      summary: Generate a story with AI, streaming tokens via Server-Sent Events
      description: |
        Same inputs as /stories/generate. Returns a `text/event-stream` response.
        Event types: `meta` (storyId), `token` (incremental text), `section`
        (phase markers), `illustration` (per-illustration completion),
        `done`, `error`. The story row is inserted at the start so a refresh
        can resume mid-generation. Closing the connection cancels generation
        and marks the row as `cancelled`. The non-streaming /stories/generate
        endpoint remains as a fallback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryBody"
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        "429":
          description: Quota exceeded

  /feed/for-you:
    get:
      operationId: getForYouFeed
      tags: [stories]
      summary: Personalized recommendations ranked by embedding similarity to the viewer's recent activity. Falls back to trending when the viewer has no signal.
      parameters:
        - name: viewerAuthorName
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Personalized feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"

  /stories/feed/facets:
    get:
      operationId: getFeedFacets
      tags: [stories]
      summary: Aggregated genre and tag counts across published stories matching the current text query.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Facet counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedFacets"

  /stories/{id}/comments/paragraph-counts:
    get:
      operationId: getParagraphCommentCounts
      tags: [comments]
      summary: Per-paragraph comment counts for inline-comment badges. Returns one entry per paragraph that has at least one anchored comment.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParagraphCommentCount"

  /stories/feed:
    get:
      operationId: getPublicFeed
      tags: [stories]
      summary: Get public story feed (published only, sorted by newest)
      parameters:
        - name: genre
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: Free-text search across title, summary, and seed prompt.
          schema:
            type: string
        - name: followerName
          in: query
          required: false
          description: When set, only return stories from authors followed by this pen name.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          required: false
          description: Sort order. "new" = newest first, "today"/"week"/"all" rank by likes+reposts+comments inside the window.
          schema:
            type: string
            enum: [new, today, week, all]
            default: new
        - name: tag
          in: query
          required: false
          description: Filter by a single tag slug.
          schema:
            type: string
        - name: style
          in: query
          required: false
          description: Filter by exact art style (matches Story.artStyle).
          schema:
            type: string
        - name: viewerAuthorName
          in: query
          required: false
          description: When set, the response decorates each story with the viewer's reading progress and the story's tags.
          schema:
            type: string
      responses:
        "200":
          description: Published stories feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"

  /stories/stats:
    get:
      operationId: getStoryStats
      tags: [stories]
      summary: Get aggregate statistics across all stories
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryStats"

  /stories/{id}:
    get:
      operationId: getStory
      tags: [stories]
      summary: Get a single story by ID with its illustrations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Story with illustrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryWithIllustrations"
        "404":
          description: Not found
    patch:
      operationId: updateStory
      tags: [stories]
      summary: Update a story (title, status, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoryBody"
      responses:
        "200":
          description: Updated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found
    delete:
      operationId: deleteStory
      tags: [stories]
      summary: Delete a story and its illustrations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stories/{id}/remix:
    post:
      operationId: remixStory
      tags: [stories]
      summary: Fork a published story as a new draft owned by the requester
      description: |
        Creates a new draft story whose `parentStoryId` points at the original.
        Copies title (suffixed with "Remix"), genre, art style, length setting and
        seed prompt. Body, illustrations and metadata are NOT copied — the remix
        is generated fresh by the new author.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemixStoryBody"
      responses:
        "201":
          description: New draft remix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "403":
          description: Source story is not published or is private
        "404":
          description: Source story not found

  /stories/{id}/forks:
    get:
      operationId: listStoryForks
      tags: [stories]
      summary: List published remixes of this story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Array of published remixes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"

  /stories/{id}/publish:
    post:
      operationId: publishStory
      tags: [stories]
      summary: Publish a story to the public feed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found

  /stories/{id}/illustrations:
    get:
      operationId: getIllustrations
      tags: [illustrations]
      summary: Get all illustrations for a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of illustrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Illustration"
    post:
      operationId: generateIllustration
      tags: [illustrations]
      summary: Generate an AI illustration for a story section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateIllustrationBody"
      responses:
        "201":
          description: Generated illustration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Illustration"
        "404":
          description: Story not found

  /stories/{id}/illustrations/{illustrationId}:
    delete:
      operationId: deleteIllustration
      tags: [illustrations]
      summary: Delete an illustration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: illustrationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stories/{id}/illustrations/{illustrationId}/regenerate:
    post:
      operationId: regenerateIllustration
      tags: [illustrations]
      summary: Regenerate an existing illustration, optionally with an edited prompt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: illustrationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                promptOverride:
                  type: string
                  description: If provided, replaces the stored prompt for this regeneration and persists.
              additionalProperties: false
      responses:
        "200":
          description: Regenerated illustration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Illustration"
        "404":
          description: Not found

  /stories/{id}/like:
    get:
      operationId: getStoryLike
      tags: [likes]
      summary: Get like count and whether the current user has liked the story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: authorName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Like info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryLikeInfo"
    post:
      operationId: likeStory
      tags: [likes]
      summary: Like a story (idempotent — repeated requests do nothing)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LikeBody"
      responses:
        "200":
          description: Updated like info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryLikeInfo"
    delete:
      operationId: unlikeStory
      tags: [likes]
      summary: Remove the current user's like
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: authorName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated like info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryLikeInfo"

  /stories/{id}/comments:
    get:
      operationId: getStoryComments
      tags: [comments]
      summary: List comments for a story (newest first)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryComment"
        "404":
          description: Story not found
    post:
      operationId: addStoryComment
      tags: [comments]
      summary: Add a comment to a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryComment"
        "404":
          description: Story not found

  /stories/{id}/comments/{commentId}:
    delete:
      operationId: deleteStoryComment
      tags: [comments]
      summary: Delete a comment (only the comment's author may delete it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
        - name: authorName
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Not the author of the comment
        "404":
          description: Not found

  /stories/{id}/continue:
    post:
      operationId: continueStory
      tags: [stories]
      summary: Append a new chapter to an existing story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinueStoryBody"
      responses:
        "200":
          description: Story with appended chapter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found

  /stories/{id}/trailer:
    post:
      operationId: generateStoryTrailer
      tags: [stories]
      summary: Kick off (or return cached) video trailer render
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Render started or already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryTrailer"
        "200":
          description: Cached trailer is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryTrailer"
        "404":
          description: Not found
    get:
      operationId: getStoryTrailer
      tags: [stories]
      summary: Get current trailer status / URL for a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current trailer state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryTrailer"
        "404":
          description: Not found

  /og/{storyId}:
    get:
      operationId: getStoryOgImage
      tags: [stories]
      summary: Render (and cache) the dynamic Open Graph image for a story
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PNG OG image (1200×630)
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /stories/{id}/audio:
    get:
      operationId: getStoryAudio
      tags: [stories]
      summary: Generate (or stream) TTS audio for a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: voice
          in: query
          required: false
          schema:
            type: string
            enum: [alloy, echo, fable, onyx, nova, shimmer]
            default: nova
      responses:
        "200":
          description: MP3 audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /stories/{id}/export.pdf:
    get:
      operationId: exportStoryPdf
      tags: [stories]
      summary: Export the story as a PDF document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /stories/{id}/regenerate:
    post:
      operationId: regenerateStoryText
      tags: [stories]
      summary: Regenerate full story text using the same genre, style, and seed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Story with updated text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found

  /stories/{id}/sections/{sectionIndex}/regenerate:
    post:
      operationId: regenerateStorySection
      tags: [stories]
      summary: Regenerate text for a specific section and its illustration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sectionIndex
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateSectionBody"
      responses:
        "200":
          description: Regenerated section text and new illustration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateSectionResponse"
        "404":
          description: Not found

  /stories/{id}/co-authors:
    get:
      operationId: listCoAuthors
      tags: [collab]
      summary: List the co-authors of a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of co-author pen names plus the primary author
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoAuthorList"
        "404":
          description: Not found
    post:
      operationId: addCoAuthor
      tags: [collab]
      summary: Add a co-author to a story (primary author only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoAuthorMutationBody"
      responses:
        "200":
          description: Updated co-author list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoAuthorList"
        "403":
          description: Only the primary author can change co-authors
        "404":
          description: Not found

  /stories/{id}/co-authors/remove:
    post:
      operationId: removeCoAuthor
      tags: [collab]
      summary: Remove a co-author (primary author only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoAuthorRemoveBody"
      responses:
        "200":
          description: Updated co-author list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoAuthorList"
        "403":
          description: Only the primary author can change co-authors
        "404":
          description: Not found

  /stories/{id}/collaborators:
    get:
      operationId: listCollaborators
      tags: [collab]
      summary: List collaborator invitations for a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Collaborator list with status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaboratorList"
        "404":
          description: Not found
    post:
      operationId: inviteCollaborator
      tags: [collab]
      summary: Invite a registered user (by handle) to co-author a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCollaboratorBody"
      responses:
        "200":
          description: Updated collaborator list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaboratorList"
        "400":
          description: Invalid handle or already invited
        "401":
          description: Authentication required
        "403":
          description: Only the primary author can invite collaborators
        "404":
          description: Story or invitee not found

  /stories/{id}/collaborators/{userId}/respond:
    post:
      operationId: respondCollaboratorInvite
      tags: [collab]
      summary: Accept or decline an invitation (invitee only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondInviteBody"
      responses:
        "200":
          description: Updated collaborator list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaboratorList"
        "401":
          description: Authentication required
        "403":
          description: Only the invitee may respond
        "404":
          description: Invitation not found

  /stories/{id}/collaborators/{userId}:
    delete:
      operationId: revokeCollaborator
      tags: [collab]
      summary: Revoke or leave a collaboration (owner or self)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated collaborator list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaboratorList"
        "401":
          description: Authentication required
        "403":
          description: Not authorized
        "404":
          description: Not found

  /stories/{id}/chapters:
    get:
      operationId: listStoryChapters
      tags: [collab]
      summary: List chapter authorship metadata for a story
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Per-chapter authorship records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterAuthorList"
        "404":
