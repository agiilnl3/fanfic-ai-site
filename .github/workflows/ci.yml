name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: fanfic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fanfic_test
      ADMIN_PASSWORD: ci-admin-token
      NODE_ENV: test
      PORT: 3000
      VITE_API_BASE_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:5173
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_API: ${{ secrets.SENTRY_PROJECT_API }}
      SENTRY_PROJECT_WEB: ${{ secrets.SENTRY_PROJECT_WEB }}
      SENTRY_RELEASE: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: pnpm --filter @workspace/db run push

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm -r --if-present run typecheck

      - name: API integration tests
        run: pnpm --filter @workspace/api-server run test

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Build fanfic-ai
        run: pnpm --filter @workspace/fanfic-ai run build

      - name: Upload api-server source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT_API != ''
        run: |
          npx --yes @sentry/cli releases new "$SENTRY_RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_API"
          npx --yes @sentry/cli releases files "$SENTRY_RELEASE" upload-sourcemaps artifacts/api-server/dist \
            --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_API" --rewrite
          npx --yes @sentry/cli releases finalize "$SENTRY_RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_API"

      - name: Upload fanfic-ai source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT_WEB != ''
        run: |
          npx --yes @sentry/cli releases new "$SENTRY_RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_WEB"
          npx --yes @sentry/cli releases files "$SENTRY_RELEASE" upload-sourcemaps artifacts/fanfic-ai/dist/public \
            --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_WEB" --rewrite
          npx --yes @sentry/cli releases finalize "$SENTRY_RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_WEB"

      - name: Install Playwright browser
        run: pnpm --filter @workspace/e2e-tests exec playwright install --with-deps chromium

      - name: Start backend (api-server)
        run: |
          pnpm --filter @workspace/api-server run start &
          echo $! > /tmp/api.pid
          ok=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/billing/config; then ok=1; break; fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then echo "api-server failed to become healthy"; exit 1; fi

      - name: Start frontend (fanfic-ai preview)
        run: |
          pnpm --filter @workspace/fanfic-ai exec vite preview --port 5173 --strictPort --host 0.0.0.0 &
          echo $! > /tmp/web.pid
          ok=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5173 >/dev/null; then ok=1; break; fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then echo "fanfic-ai failed to become healthy"; exit 1; fi

      - name: E2E tests
        run: pnpm --filter @workspace/e2e-tests run test

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/api.pid ] && kill $(cat /tmp/api.pid) || true
          [ -f /tmp/web.pid ] && kill $(cat /tmp/web.pid) || true
