name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: fanfic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fanfic_test
      ADMIN_PASSWORD: ci-admin-token
      NODE_ENV: test
      PORT: 3000
      VITE_API_BASE_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Push DB schema
        run: pnpm --filter @workspace/db run push

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm -r --if-present run typecheck

      - name: API integration tests
        run: pnpm --filter @workspace/api-server run test

      - name: Install Playwright browser
        run: pnpm --filter @workspace/e2e-tests exec playwright install --with-deps chromium

      - name: Start backend (api-server)
        run: |
          pnpm --filter @workspace/api-server run build
          pnpm --filter @workspace/api-server run start &
          echo $! > /tmp/api.pid
          for i in $(seq 1 40); do
            curl -sf http://localhost:3000/api/billing/config && break || sleep 1;
          done

      - name: Start frontend (fanfic-ai)
        run: |
          pnpm --filter @workspace/fanfic-ai run build || true
          pnpm --filter @workspace/fanfic-ai run dev &
          echo $! > /tmp/web.pid
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173 && break || sleep 1;
          done

      - name: E2E tests
        run: pnpm --filter @workspace/e2e-tests run test

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/api.pid ] && kill $(cat /tmp/api.pid) || true
          [ -f /tmp/web.pid ] && kill $(cat /tmp/web.pid) || true
